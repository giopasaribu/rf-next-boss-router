# Render Blueprint — deploys the RF Boss Announcement Router as a web service.
# Spec: https://render.com/docs/blueprint-spec
#
# How to use: push this repo to GitHub, then in the Render dashboard click
# "New +" -> "Blueprint", point it at the repo, and Render reads this file. It
# creates the service and prompts you to enter the secret values marked
# `sync: false` below. See DEPLOY-RENDER.md for the full walkthrough.

services:
  - type: web
    name: rf-boss-router
    runtime: node
    plan: free
    # Install ALL deps (including devDependencies like typescript/tsx) then
    # compile. `--include=dev` is REQUIRED: Render sets NODE_ENV=production,
    # which would otherwise skip devDependencies and break `tsc` at build time.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    # Render pings this to confirm the app is healthy; the server exposes it.
    healthCheckPath: /healthz
    # Redeploy automatically on every push to the connected branch.
    autoDeploy: true
    envVars:
      # Pin the Node major version used to build/run.
      - key: NODE_VERSION
        value: "22"

      # Bind all interfaces so Render can route traffic to the app. Do NOT set
      # 127.0.0.1 here. (PORT is injected by Render automatically — don't set it.)
      - key: HOST
        value: 0.0.0.0

      # --- LLM (Groq) ---------------------------------------------------------
      # Enter your key (gsk_...) in the dashboard when prompted.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # --- Shared secret ------------------------------------------------------
      # Auto-generated as a strong random string. Reveal it in the Render
      # dashboard (Environment tab) — that's the password you type into the form.
      - key: APP_SHARED_SECRET
        generateValue: true

      # --- Discord webhooks ---------------------------------------------------
      # Enter these in the dashboard. For the FIRST test, point all three guild
      # webhooks at a throwaway private #router-test channel (see DEPLOY-RENDER.md).
      - key: WEBHOOK_GGI
        sync: false
      - key: WEBHOOK_EMP
        sync: false
      - key: WEBHOOK_EMPIRE
        sync: false
      - key: WEBHOOK_NEEDS_REVIEW
        sync: false

      # --- Optional: role pings + Telegram personal copy ----------------------
      # Add these in the dashboard if you want them (leaving them unset is fine).
      # - key: ROLE_ID_GGI
      #     sync: false
      # - key: ROLE_ID_EMP
      #     sync: false
      # - key: ROLE_ID_EMPIRE
      #     sync: false
      # - key: TELEGRAM_BOT_TOKEN
      #     sync: false
      # - key: TELEGRAM_CHAT_ID
      #     sync: false
